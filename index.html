<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hao123 - 简洁高效</title>
    <style>
        :root {
            --primary: #2563eb; --bg: #f8fafc; --card: #ffffff;
            --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        
        header { background: var(--card); padding: 1.5rem; text-align: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); text-transform: lowercase; }

        main { flex: 1; max-width: 600px; margin: 2rem auto; width: 90%; }
        
        .card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 8px; 
            padding: 1rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between;
        }
        .info { overflow: hidden; margin-right: 10px; }
        .label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
        .url { color: var(--primary); text-decoration: none; font-size: 0.95rem; word-break: break-all; font-weight: 500; }
        
        .copy-btn { 
            background: #f1f5f9; border: none; padding: 8px 16px; border-radius: 6px; 
            cursor: pointer; font-size: 0.85rem; transition: 0.2s; white-space: nowrap;
        }
        .copy-btn:active { transform: scale(0.95); }
        .success { background: #dcfce7; color: #166534; }

        footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.85rem; }
    </style>
</head>
<body>

    <header><div class="logo">hao123</div></header>

    <main id="list"></main>

    <footer>&copy; <span id="year"></span> Just. All rights reserved.</footer>

    <script>
        // --- 只需要在这里修改数据 ---
        const links = [
            { label: "WMS-GoogleSite", url: "https://sites.google.com/nis.ac.th/wms/home" },
            { label: "WMS-Vercle", url: "https://writingms.vercel.app" } ,
            { label: "WMS-Names", url: "https://sites.google.com/nis.ac.th/wms/home" },
            { label: "SafeExamBrowser", url: "http://safeexambrowser.org/" },
            { label: "HSCSExam.seb", url: "https://drive.google.com/file/d/1SBaRXmPbjE8_wK35Fu2aAMXHVsAIsH2U/view?usp=sharing" },
            { label: "Tardy", url: "https://tardycheck.vercel.app" },
            { label: "Names", url: "https://www.name.com" },
            { label: "Vercel", url: "https://vercel.com" },
            { label: "Supabase", url: "https://supabase.com" }
        ];

        // 自动渲染列表
        const container = document.getElementById('list');
        container.innerHTML = links.map(item => `
            <div class="card">
                <div class="info">
                    <span class="label">${item.label}</span>
                    <a href="${item.url}" class="url" target="_blank">${item.url}</a>
                </div>
                <button class="copy-btn" onclick="copyText('${item.url}', this)">复制</button>
            </div>
        `).join('');

        // 复制功能
        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const old = btn.innerText;
                btn.innerText = '已复制';
                btn.classList.add('success');
                setTimeout(() => { btn.innerText = old; btn.classList.remove('success'); }, 1500);
            });
        }

        // 时间逻辑
        const start = 2026, now = new Date().getFullYear();
        document.getElementById('year').innerText = now > start ? `${start}-${now}` : start;
    </script>
</body>
</html>
